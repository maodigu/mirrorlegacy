baseURL: https://example.com/example_novel/
languageCode: [THE_LANGUAGE]
title: [THE_TITLE_OF_THE_NOVEL]

mediaTypes:
    text/javascript:
        suffixes:
            - js
    application/manifest+json:
        suffixes:
            - webmanifest

outputFormats:
    ServiceWorker:
        mediaType: text/javascript
        baseName: sw
        isPlainText: true
        notAlternative: true
    Offline:
        mediaType: text/html
        baseName: offline
        isPlainText: false
        notAlternative: true
    WebAppManifest:
        mediaType: application/manifest+json
        rel: manifest
        baseName: site
        isPlainText: true
        notAlternative: true

outputs:
    home:
        - HTML
        - RSS
        - ServiceWorker
        - Offline
        - WebAppManifest

markup:
    goldmark:
        renderer:
            unsafe: true

disableKinds:
    - section
    - taxonomy
    - term
